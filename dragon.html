<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ドラゴン 🐲 バスボール魔法</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap');
:root{--c1:#FF6B3D;--c2:#FFD93D;--c3:#FF4D4D;--bg:#120A04;--card:rgba(255,255,255,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:#fff;min-height:100vh;overflow-x:hidden}

.bg-blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:0.2;animation:blobMove 8s ease-in-out infinite alternate}
.blob:nth-child(1){width:300px;height:300px;background:#FF4D2D;top:-80px;left:-60px;animation-delay:0s}
.blob:nth-child(2){width:240px;height:240px;background:#FFB020;bottom:-60px;right:-50px;animation-delay:2s}
.blob:nth-child(3){width:180px;height:180px;background:#FF6B3D;top:45%;right:15%;animation-delay:1s}
@keyframes blobMove{0%{transform:translate(0,0) scale(1)}100%{transform:translate(25px,20px) scale(1.1)}}

.bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bubbles span{position:absolute;bottom:-80px;border-radius:50%;background:rgba(255,107,61,0.06);border:1px solid rgba(255,107,61,0.12);animation:floatUp linear infinite}
.bubbles span:nth-child(1){left:6%;width:35px;height:35px;animation-duration:7s;animation-delay:0s}
.bubbles span:nth-child(2){left:22%;width:18px;height:18px;animation-duration:5.5s;animation-delay:1s}
.bubbles span:nth-child(3){left:42%;width:55px;height:55px;animation-duration:9s;animation-delay:2.2s}
.bubbles span:nth-child(4){left:63%;width:28px;height:28px;animation-duration:6.5s;animation-delay:0.8s}
.bubbles span:nth-child(5){left:82%;width:42px;height:42px;animation-duration:8s;animation-delay:3s}
@keyframes floatUp{0%{transform:translateY(0);opacity:0.5}100%{transform:translateY(-110vh);opacity:0}}

.wrap{position:relative;z-index:1;max-width:420px;margin:0 auto;padding:24px 16px 60px}
.brand{text-align:center;padding:16px 0 8px;font-size:0.7rem;letter-spacing:0.2em;color:rgba(255,255,255,0.3);text-transform:uppercase}

.reveal-banner{text-align:center;margin:8px 0 20px;animation:fadeDown 0.6s ease both}
.rarity-badge{
  display:inline-block;padding:5px 18px;border-radius:20px;
  font-family:'Fredoka One',cursive;font-size:0.85rem;letter-spacing:0.15em;
  background:linear-gradient(135deg,rgba(255,107,61,0.3),rgba(255,217,61,0.3));
  border:1px solid rgba(255,107,61,0.5);color:var(--c2);
  margin-bottom:10px;box-shadow:0 0 20px rgba(255,77,77,0.3)
}
.char-name{
  font-family:'Fredoka One',cursive;font-size:2.2rem;
  background:linear-gradient(135deg,var(--c1),var(--c2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 14px rgba(255,107,61,0.6))
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}

.stage{position:relative;height:260px;display:flex;align-items:center;justify-content:center;margin:0 -4px}
.stage-glow{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:220px;height:80px;
  background:radial-gradient(ellipse,rgba(255,107,61,0.4),transparent 70%);
  filter:blur(14px)
}
/* Fire rings */
.fire-ring{
  position:absolute;bottom:25px;left:50%;
  border-radius:50%;border:2px solid rgba(255,107,61,0.2);
  animation:fireRing 2.5s ease-out infinite
}
.fire-ring:nth-child(1){width:80px;height:22px;transform:translateX(-50%);animation-delay:0s}
.fire-ring:nth-child(2){width:140px;height:38px;transform:translateX(-50%);animation-delay:0.8s}
.fire-ring:nth-child(3){width:200px;height:52px;transform:translateX(-50%);animation-delay:1.6s}
@keyframes fireRing{0%{opacity:0.7;transform:translateX(-50%) scale(0.9)}100%{opacity:0;transform:translateX(-50%) scale(1.2)}}

.sparkles{position:absolute;inset:0;pointer-events:none}
.sp{position:absolute;animation:spPop 2.2s ease-in-out infinite}
.sp:nth-child(1){top:8%;left:5%;font-size:1.1rem;animation-delay:0s}
.sp:nth-child(2){top:14%;right:7%;font-size:1.3rem;animation-delay:0.4s}
.sp:nth-child(3){top:48%;left:4%;font-size:0.9rem;animation-delay:0.9s}
.sp:nth-child(4){top:52%;right:6%;font-size:1rem;animation-delay:0.7s}
.sp:nth-child(5){top:72%;left:16%;font-size:0.8rem;animation-delay:1.4s}
.sp:nth-child(6){top:18%;left:44%;font-size:0.75rem;animation-delay:0.2s}
@keyframes spPop{0%,100%{opacity:0;transform:scale(0.3) rotate(0deg)}40%,60%{opacity:1;transform:scale(1.2) rotate(12deg)}}

.char-emoji{
  font-size:130px;line-height:1;z-index:2;position:relative;
  filter:drop-shadow(0 0 30px rgba(255,77,77,0.6)) drop-shadow(0 20px 20px rgba(0,0,0,0.4));
  animation:charFloat 3s ease-in-out infinite
}
@keyframes charFloat{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-12px) rotate(2deg)}}

.slogan-card{
  background:linear-gradient(135deg,rgba(255,107,61,0.12),rgba(255,217,61,0.08));
  border:1.5px solid rgba(255,107,61,0.25);
  border-radius:20px 20px 20px 4px;
  padding:16px 18px;margin:16px 0;
  box-shadow:0 0 24px rgba(255,77,77,0.12);
  animation:fadeUp 0.7s 0.3s ease both
}
.slogan-who{font-size:0.65rem;font-weight:800;letter-spacing:0.12em;color:var(--c1);margin-bottom:6px;text-transform:uppercase}
.slogan-jp{font-family:'Fredoka One',cursive;font-size:1rem;line-height:1.6;color:#fff;margin-bottom:6px}
.slogan-small{font-size:0.72rem;color:rgba(255,255,255,0.45);line-height:1.5}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.audio-section{margin:14px 0;animation:fadeUp 0.7s 0.5s ease both}
.audio-label{font-size:0.65rem;font-weight:800;letter-spacing:0.12em;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:8px}
.audio-card{background:var(--card);border:1.5px solid rgba(255,255,255,0.08);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:14px;backdrop-filter:blur(8px)}
.play-btn{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--c3),var(--c2));
  border:none;cursor:pointer;font-size:1.1rem;
  box-shadow:0 0 20px rgba(255,77,77,0.45);
  transition:transform 0.2s;display:flex;align-items:center;justify-content:center
}
.play-btn:active{transform:scale(0.93)}
.waves{display:flex;align-items:center;gap:3px;flex:1;height:32px}
.wb{width:3px;border-radius:3px;background:var(--c1)}
.wb.playing{animation:waveDance 0.55s ease-in-out infinite}
.wb:nth-child(1){height:8px;animation-delay:0s}
.wb:nth-child(2){height:22px;animation-delay:0.06s}
.wb:nth-child(3){height:14px;animation-delay:0.12s}
.wb:nth-child(4){height:28px;animation-delay:0.08s}
.wb:nth-child(5){height:10px;animation-delay:0.18s}
.wb:nth-child(6){height:18px;animation-delay:0.04s}
.wb:nth-child(7){height:9px;animation-delay:0.15s}
.wb:nth-child(8){height:20px;animation-delay:0.1s}
@keyframes waveDance{0%,100%{transform:scaleY(0.3)}50%{transform:scaleY(1)}}
.audio-info{display:flex;flex-direction:column;gap:3px}
.audio-title{font-size:0.8rem;font-weight:800;color:rgba(255,255,255,0.8)}
.audio-sub{font-size:0.65rem;color:rgba(255,255,255,0.35)}

.stats-section{margin:14px 0;animation:fadeUp 0.7s 0.6s ease both}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:var(--card);border:1.5px solid rgba(255,255,255,0.07);border-radius:14px;padding:12px 8px;text-align:center;backdrop-filter:blur(8px)}
.stat-v{font-family:'Fredoka One',cursive;font-size:1.1rem;line-height:1.2;margin-bottom:4px}
.stat-k{font-size:0.6rem;color:rgba(255,255,255,0.4);letter-spacing:0.08em;text-transform:uppercase}

.cta-section{margin:20px 0 0;animation:fadeUp 0.7s 0.8s ease both}
.btn-collect{
  width:100%;padding:16px;border:none;border-radius:18px;cursor:pointer;
  font-family:'Fredoka One',cursive;font-size:1.05rem;
  background:linear-gradient(135deg,var(--c3),var(--c2));color:#1a0800;
  box-shadow:0 0 28px rgba(255,77,77,0.35);
  transition:transform 0.2s;margin-bottom:10px
}
.btn-collect:active{transform:scale(0.97)}
.btn-share{
  width:100%;padding:13px;border-radius:14px;
  border:1.5px solid rgba(255,255,255,0.12);background:transparent;
  color:rgba(255,255,255,0.5);font-family:'Nunito',sans-serif;font-weight:800;font-size:0.82rem;cursor:pointer
}

#conf{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
.c{position:absolute;top:-12px;animation:cFall linear forwards}
@keyframes cFall{0%{transform:translateY(0) rotate(0) translateX(0);opacity:1}100%{transform:translateY(105vh) rotate(540deg) translateX(var(--dx));opacity:0}}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(20,10,2,0.92);backdrop-filter:blur(16px);border:1px solid rgba(255,107,61,0.25);border-radius:14px;padding:10px 22px;font-size:0.8rem;font-weight:800;color:#fff;opacity:0;transition:all 0.3s;pointer-events:none;z-index:200;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="bg-blobs"><div class="blob"></div><div class="blob"></div><div class="blob"></div></div>
<div class="bubbles"><span></span><span></span><span></span><span></span><span></span></div>
<div id="conf"></div>
<div id="toast"></div>

<div class="wrap">
  <div class="brand">🛁 バスボール魔法 · Bath Ball Magic</div>

  <div class="reveal-banner">
    <div class="rarity-badge">🔥 SR レア</div>
    <div class="char-name">ドラゴン</div>
  </div>

  <div class="stage">
    <div class="stage-glow"></div>
    <div class="fire-ring"></div><div class="fire-ring"></div><div class="fire-ring"></div>
    <div class="sparkles">
      <span class="sp">🔥</span><span class="sp">⚡</span><span class="sp">💥</span>
      <span class="sp">🔥</span><span class="sp">⚡</span><span class="sp">✨</span>
    </div>
    <div class="char-emoji">🐲</div>
  </div>

  <div class="slogan-card">
    <div class="slogan-who">ドラゴン からのメッセージ</div>
    <div class="slogan-jp">バスタイムはぼうけんだ！いっしょにあわのうみをおよごう！🔥</div>
    <div class="slogan-small">バスタイムは冒険だ！一緒に泡の海を泳ごう！</div>
  </div>

  <div class="audio-section">
    <div class="audio-label">🎵 ドラゴンのこえ · Voice</div>
    <div class="audio-card">
      <button class="play-btn" id="playBtn" onclick="toggleAudio()">▶</button>
      <div class="waves" id="waves">
        <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
        <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
      </div>
      <div class="audio-info">
        <div class="audio-title">ドラゴン (SR)</div>
        <div class="audio-sub" id="audioStatus">タップして再生 · Tap to play</div>
      </div>
    </div>
  </div>

  <div class="stats-section">
    <div class="audio-label">📊 キャラクターデータ</div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-v" style="color:#C44DFF">⭐⭐⭐</div><div class="stat-k">レア度</div></div>
      <div class="stat"><div class="stat-v" style="color:#FF4D4D">🔥🔥🔥</div><div class="stat-k">ほのおパワー</div></div>
      <div class="stat"><div class="stat-v" style="color:#FFD93D">2まい</div><div class="stat-k">つばさ</div></div>
    </div>
  </div>

  <div class="cta-section">
    <button class="btn-collect" onclick="doCollect()">💎 コレクションに追加！</button>
    <button class="btn-share" onclick="doShare()">📤 ともだちにシェアする</button>
  </div>
</div>

<script>
let isSpeaking = false;
const slogans = [
  'バスタイムはぼうけんだ！いっしょにあわのうみをおよごう！',
  'ドラゴンのほのおで、おふろをもっとたのしくするぞ！'
];
let sloganIdx = 0;

function toggleAudio() {
  if ('speechSynthesis' in window) {
    if (isSpeaking) { speechSynthesis.cancel(); setPlaying(false); return; }
    const utt = new SpeechSynthesisUtterance(slogans[sloganIdx % slogans.length]);
    utt.lang = 'ja-JP'; utt.rate = 0.85; utt.pitch = 0.85; utt.volume = 1;
    utt.onstart = () => setPlaying(true);
    utt.onend = () => { setPlaying(false); sloganIdx++; };
    utt.onerror = () => setPlaying(false);
    speechSynthesis.speak(utt);
  } else { showToast('⚠️ このブラウザは音声未対応です'); }
}

function setPlaying(v) {
  isSpeaking = v;
  document.getElementById('playBtn').textContent = v ? '⏹' : '▶';
  document.getElementById('audioStatus').textContent = v ? '再生中... ▶' : 'タップして再生 · Tap to play';
  document.querySelectorAll('.wb').forEach(w => { w.className = 'wb ' + (v ? 'playing' : ''); });
}

function doCollect() { launchConfetti(); showToast('💎 ドラゴンをコレクションに追加しました！'); }
function doShare() {
  if (navigator.share) { navigator.share({ title: 'ドラゴン 🐲 バスボール魔法', text: 'バスタイムは冒険だ！', url: location.href }); }
  else { navigator.clipboard?.writeText(location.href); showToast('🔗 URLをコピーしました！'); }
}

function launchConfetti() {
  const colors = ['#FF6B3D','#FFD93D','#FF4D4D','#FFAA20','#fff'];
  const c = document.getElementById('conf');
  for (let i = 0; i < 70; i++) {
    const d = document.createElement('div');
    const dx = (Math.random()-0.5)*120;
    d.className = 'c';
    d.style.cssText = `left:${Math.random()*100}%;width:${5+Math.random()*9}px;height:${5+Math.random()*9}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.4+Math.random()*1.8}s;animation-delay:${Math.random()*0.4}s;--dx:${dx}px`;
    c.appendChild(d);
    setTimeout(() => d.remove(), 3000);
  }
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
setTimeout(launchConfetti, 600);

let autoPlayed = false;
function tryAutoPlay() {
  if (autoPlayed) return;
  autoPlayed = true;
  setTimeout(() => { if (!isSpeaking) toggleAudio(); }, 600);
}
document.addEventListener('touchstart', tryAutoPlay, { once: true });
document.addEventListener('click',      tryAutoPlay, { once: true });
</script>
</body>
</html>
