<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>マリエル 🧜 バスボール魔法</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap');
:root{--c1:#4DC8FF;--c2:#6BFF8E;--c3:#C44DFF;--bg:#070F1A;--card:rgba(255,255,255,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:#fff;min-height:100vh;overflow-x:hidden}

.bg-blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:0.2;animation:blobMove 9s ease-in-out infinite alternate}
.blob:nth-child(1){width:320px;height:320px;background:var(--c1);top:-100px;right:-80px;animation-delay:0s}
.blob:nth-child(2){width:200px;height:200px;background:var(--c2);bottom:-50px;left:-40px;animation-delay:3s}
.blob:nth-child(3){width:160px;height:160px;background:var(--c3);top:50%;left:20%;animation-delay:1.5s}
@keyframes blobMove{0%{transform:translate(0,0) scale(1)}100%{transform:translate(20px,30px) scale(1.12)}}

/* Wave pattern background */
.wave-bg{position:fixed;bottom:0;left:0;right:0;height:40%;pointer-events:none;z-index:0;opacity:0.04}
.wave-bg svg{width:100%;height:100%}

.bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bubbles span{position:absolute;bottom:-80px;border-radius:50%;background:rgba(77,200,255,0.08);border:1px solid rgba(77,200,255,0.15);animation:floatUp linear infinite}
.bubbles span:nth-child(1){left:10%;width:50px;height:50px;animation-duration:8s;animation-delay:0s}
.bubbles span:nth-child(2){left:25%;width:22px;height:22px;animation-duration:6s;animation-delay:1.2s}
.bubbles span:nth-child(3){left:45%;width:70px;height:70px;animation-duration:10s;animation-delay:2s}
.bubbles span:nth-child(4){left:65%;width:30px;height:30px;animation-duration:7s;animation-delay:0.7s}
.bubbles span:nth-child(5){left:80%;width:40px;height:40px;animation-duration:9s;animation-delay:3.5s}
@keyframes floatUp{0%{transform:translateY(0);opacity:0.5}100%{transform:translateY(-110vh);opacity:0}}

.wrap{position:relative;z-index:1;max-width:420px;margin:0 auto;padding:24px 16px 60px}

.brand{text-align:center;padding:16px 0 8px;font-size:0.7rem;letter-spacing:0.2em;color:rgba(255,255,255,0.3);text-transform:uppercase}

.reveal-banner{text-align:center;margin:8px 0 20px;animation:fadeDown 0.6s ease both}
.rarity-badge{
  display:inline-block;padding:5px 18px;border-radius:20px;
  font-family:'Fredoka One',cursive;font-size:0.85rem;letter-spacing:0.15em;
  background:linear-gradient(135deg,rgba(77,200,255,0.3),rgba(107,255,142,0.3));
  border:1px solid rgba(77,200,255,0.5);color:var(--c1);
  margin-bottom:10px;box-shadow:0 0 20px rgba(77,200,255,0.3)
}
.char-name{
  font-family:'Fredoka One',cursive;font-size:2.2rem;
  background:linear-gradient(135deg,var(--c1),var(--c2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 14px rgba(77,200,255,0.5))
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}

.stage{position:relative;height:260px;display:flex;align-items:center;justify-content:center;margin:0 -4px}
.stage-glow{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:220px;height:80px;
  background:radial-gradient(ellipse,rgba(77,200,255,0.35),transparent 70%);
  filter:blur(14px)
}
/* Ripple rings for mermaid */
.ripple{
  position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  border-radius:50%;border:1.5px solid rgba(77,200,255,0.25);
  animation:rippleOut 3s ease-out infinite
}
.ripple:nth-child(1){width:90px;height:26px;animation-delay:0s}
.ripple:nth-child(2){width:150px;height:42px;animation-delay:1s}
.ripple:nth-child(3){width:210px;height:58px;animation-delay:2s}
@keyframes rippleOut{0%{opacity:0.6;transform:translateX(-50%) scale(0.85)}100%{opacity:0;transform:translateX(-50%) scale(1.2)}}

.sparkles{position:absolute;inset:0;pointer-events:none}
.sp{position:absolute;animation:spPop 2.8s ease-in-out infinite}
.sp:nth-child(1){top:8%;left:6%;font-size:1rem;animation-delay:0s}
.sp:nth-child(2){top:12%;right:8%;font-size:1.4rem;animation-delay:0.6s}
.sp:nth-child(3){top:50%;left:3%;font-size:0.75rem;animation-delay:1.1s}
.sp:nth-child(4){top:48%;right:5%;font-size:1.2rem;animation-delay:0.9s}
.sp:nth-child(5){top:70%;left:18%;font-size:0.85rem;animation-delay:1.6s}
.sp:nth-child(6){top:20%;left:42%;font-size:0.7rem;animation-delay:0.4s}
@keyframes spPop{0%,100%{opacity:0;transform:scale(0.3) rotate(0deg)}40%,60%{opacity:1;transform:scale(1.1) rotate(8deg)}}

.char-emoji{
  font-size:130px;line-height:1;z-index:2;position:relative;
  filter:drop-shadow(0 0 30px rgba(77,200,255,0.5)) drop-shadow(0 20px 20px rgba(0,0,0,0.3));
  animation:charFloat 4s ease-in-out infinite
}
@keyframes charFloat{0%,100%{transform:translateY(0) rotate(1deg)}50%{transform:translateY(-14px) rotate(-2deg)}}

.slogan-card{
  background:linear-gradient(135deg,rgba(77,200,255,0.1),rgba(107,255,142,0.08));
  border:1.5px solid rgba(77,200,255,0.22);
  border-radius:20px 20px 20px 4px;
  padding:16px 18px;margin:16px 0;
  box-shadow:0 0 24px rgba(77,200,255,0.12);
  animation:fadeUp 0.7s 0.3s ease both
}
.slogan-who{font-size:0.65rem;font-weight:800;letter-spacing:0.12em;color:var(--c1);margin-bottom:6px;text-transform:uppercase}
.slogan-jp{font-family:'Fredoka One',cursive;font-size:1rem;line-height:1.6;color:#fff;margin-bottom:6px}
.slogan-small{font-size:0.72rem;color:rgba(255,255,255,0.45);line-height:1.5}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.audio-section{margin:14px 0;animation:fadeUp 0.7s 0.5s ease both}
.audio-label{font-size:0.65rem;font-weight:800;letter-spacing:0.12em;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:8px}
.audio-card{
  background:var(--card);border:1.5px solid rgba(255,255,255,0.08);
  border-radius:16px;padding:14px 16px;
  display:flex;align-items:center;gap:14px;
  backdrop-filter:blur(8px)
}
.play-btn{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--c1),var(--c2));
  border:none;cursor:pointer;font-size:1.1rem;
  box-shadow:0 0 20px rgba(77,200,255,0.4);
  transition:transform 0.2s;
  display:flex;align-items:center;justify-content:center
}
.play-btn:active{transform:scale(0.93)}
.waves{display:flex;align-items:center;gap:3px;flex:1;height:32px}
.wb{width:3px;border-radius:3px;background:var(--c1)}
.wb.playing{animation:waveDance 0.6s ease-in-out infinite}
.wb:nth-child(1){height:8px;animation-delay:0s}
.wb:nth-child(2){height:20px;animation-delay:0.07s}
.wb:nth-child(3){height:14px;animation-delay:0.14s}
.wb:nth-child(4){height:26px;animation-delay:0.07s}
.wb:nth-child(5){height:10px;animation-delay:0.21s}
.wb:nth-child(6){height:18px;animation-delay:0.05s}
.wb:nth-child(7){height:8px;animation-delay:0.16s}
.wb:nth-child(8){height:22px;animation-delay:0.09s}
@keyframes waveDance{0%,100%{transform:scaleY(0.3)}50%{transform:scaleY(1)}}
.audio-info{display:flex;flex-direction:column;gap:3px}
.audio-title{font-size:0.8rem;font-weight:800;color:rgba(255,255,255,0.8)}
.audio-sub{font-size:0.65rem;color:rgba(255,255,255,0.35)}

.stats-section{margin:14px 0;animation:fadeUp 0.7s 0.6s ease both}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:var(--card);border:1.5px solid rgba(255,255,255,0.07);border-radius:14px;padding:12px 8px;text-align:center;backdrop-filter:blur(8px)}
.stat-v{font-family:'Fredoka One',cursive;font-size:1.1rem;line-height:1.2;margin-bottom:4px}
.stat-k{font-size:0.6rem;color:rgba(255,255,255,0.4);letter-spacing:0.08em;text-transform:uppercase}

.cta-section{margin:20px 0 0;animation:fadeUp 0.7s 0.8s ease both}
.btn-collect{
  width:100%;padding:16px;border:none;border-radius:18px;cursor:pointer;
  font-family:'Fredoka One',cursive;font-size:1.05rem;letter-spacing:0.04em;
  background:linear-gradient(135deg,var(--c1),var(--c2));color:#0a1a10;
  box-shadow:0 0 28px rgba(77,200,255,0.35);
  transition:transform 0.2s;margin-bottom:10px
}
.btn-collect:active{transform:scale(0.97)}
.btn-share{
  width:100%;padding:13px;border-radius:14px;
  border:1.5px solid rgba(255,255,255,0.12);background:transparent;
  color:rgba(255,255,255,0.5);font-family:'Nunito',sans-serif;font-weight:800;font-size:0.82rem;
  cursor:pointer;transition:all 0.2s
}

#conf{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
.c{position:absolute;top:-12px;border-radius:2px;animation:cFall linear forwards}
@keyframes cFall{0%{transform:translateY(0) rotate(0) translateX(0);opacity:1}100%{transform:translateY(105vh) rotate(540deg) translateX(var(--dx));opacity:0}}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(10,20,30,0.9);backdrop-filter:blur(16px);border:1px solid rgba(77,200,255,0.2);border-radius:14px;padding:10px 22px;font-size:0.8rem;font-weight:800;color:#fff;opacity:0;transition:all 0.3s;pointer-events:none;z-index:200;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="bg-blobs"><div class="blob"></div><div class="blob"></div><div class="blob"></div></div>
<div class="bubbles"><span></span><span></span><span></span><span></span><span></span></div>
<div id="conf"></div>
<div id="toast"></div>

<div class="wrap">
  <div class="brand">🛁 バスボール魔法 · Bath Ball Magic</div>

  <div class="reveal-banner">
    <div class="rarity-badge">🌊 SR レア</div>
    <div class="char-name">マリエル</div>
  </div>

  <div class="stage">
    <div class="stage-glow"></div>
    <div class="ripple"></div><div class="ripple"></div><div class="ripple"></div>
    <div class="sparkles">
      <span class="sp">🫧</span><span class="sp">💙</span><span class="sp">🌊</span>
      <span class="sp">🫧</span><span class="sp">💙</span><span class="sp">✨</span>
    </div>
    <div class="char-emoji">🧜</div>
  </div>

  <div class="slogan-card">
    <div class="slogan-who">マリエル からのメッセージ</div>
    <div class="slogan-jp">うみのうたをきかせてあげる。バスタイムはだいかいげん！🌊</div>
    <div class="slogan-small">海の歌を聴かせてあげる。バスタイムは大海原！</div>
  </div>

  <div class="audio-section">
    <div class="audio-label">🎵 マリエルのこえ · Voice</div>
    <div class="audio-card">
      <button class="play-btn" id="playBtn" onclick="toggleAudio()">▶</button>
      <div class="waves" id="waves">
        <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
        <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
      </div>
      <div class="audio-info">
        <div class="audio-title">マリエル (SR)</div>
        <div class="audio-sub" id="audioStatus">タップして再生 · Tap to play</div>
      </div>
    </div>
  </div>

  <div class="stats-section">
    <div class="audio-label">📊 キャラクターデータ</div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-v" style="color:#C44DFF">⭐⭐⭐</div><div class="stat-k">レア度</div></div>
      <div class="stat"><div class="stat-v" style="color:#4DC8FF">★★★</div><div class="stat-k">うたごえ</div></div>
      <div class="stat"><div class="stat-v" style="color:#6BFF8E">3000まい</div><div class="stat-k">うろこ</div></div>
    </div>
  </div>

  <div class="cta-section">
    <button class="btn-collect" onclick="doCollect()">💎 コレクションに追加！</button>
    <button class="btn-share" onclick="doShare()">📤 ともだちにシェアする</button>
  </div>
</div>

<script>
let isSpeaking = false;
const slogans = [
  'うみのうたをきかせてあげる。バスタイムはだいかいげん！',
  'マリエルといっしょに、うみのせかいをたんけんしよう！'
];
let sloganIdx = 0;

function toggleAudio() {
  if ('speechSynthesis' in window) {
    if (isSpeaking) { speechSynthesis.cancel(); setPlaying(false); return; }
    const utt = new SpeechSynthesisUtterance(slogans[sloganIdx % slogans.length]);
    utt.lang = 'ja-JP'; utt.rate = 0.88; utt.pitch = 1.25; utt.volume = 1;
    utt.onstart = () => setPlaying(true);
    utt.onend = () => { setPlaying(false); sloganIdx++; };
    utt.onerror = () => setPlaying(false);
    speechSynthesis.speak(utt);
  } else { showToast('⚠️ このブラウザは音声未対応です'); }
}

function setPlaying(v) {
  isSpeaking = v;
  document.getElementById('playBtn').textContent = v ? '⏹' : '▶';
  document.getElementById('audioStatus').textContent = v ? '再生中... ▶' : 'タップして再生 · Tap to play';
  document.querySelectorAll('.wb').forEach(w => { w.className = 'wb ' + (v ? 'playing' : ''); });
}

function doCollect() { launchConfetti(); showToast('💎 マリエルをコレクションに追加しました！'); }
function doShare() {
  if (navigator.share) { navigator.share({ title: 'マリエル 🧜 バスボール魔法', text: 'うみのうたをきかせてあげる！', url: location.href }); }
  else { navigator.clipboard?.writeText(location.href); showToast('🔗 URLをコピーしました！'); }
}

function launchConfetti() {
  const colors = ['#4DC8FF','#6BFF8E','#C44DFF','#FFD93D','#fff'];
  const c = document.getElementById('conf');
  for (let i = 0; i < 70; i++) {
    const d = document.createElement('div');
    const dx = (Math.random()-0.5)*120;
    d.className = 'c';
    d.style.cssText = `left:${Math.random()*100}%;width:${5+Math.random()*9}px;height:${5+Math.random()*9}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.4+Math.random()*1.8}s;animation-delay:${Math.random()*0.4}s;--dx:${dx}px`;
    c.appendChild(d);
    setTimeout(() => d.remove(), 3000);
  }
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
setTimeout(launchConfetti, 600);
</script>
</body>
</html>
